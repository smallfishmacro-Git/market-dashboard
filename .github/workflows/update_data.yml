name: Daily Data Update

on:
  schedule:
    # 4:30 PM ET year-round — two entries to cover EST and EDT:
    #   EST (UTC-5): Nov–Feb  → 21:30 UTC
    #   EDT (UTC-4): Mar–Oct  → 20:30 UTC
    # Note: DST transitions fall partway through Mar/Nov, so the switch is
    # approximate (±1 hr on transition week only).
    - cron: "30 21 * 1,2,11,12 1-5"   # EST  — Jan, Feb, Nov, Dec
    - cron: "30 20 * 3-10      1-5"   # EDT  — Mar through Oct
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push updated CSVs back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data updater
        run: python data_updater.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/barchart/*.csv data/datasets/*.csv
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push
