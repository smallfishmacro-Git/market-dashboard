name: Daily Data Update

on:
  schedule:
    # All times in UTC — Geneva is CET (UTC+1) winter / CEST (UTC+2) summer
    # During CEST (late Mar–late Oct) these run 1h later Geneva time
    - cron: "0 5 * * 1-5"     # 06:00 Geneva CET  — pre-market
    - cron: "20 14 * * 1-5"   # 15:20 Geneva CET  — mid-afternoon (US open settled)
    - cron: "30 21 * * 1-5"   # 22:30 Geneva CET  — post US close
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push updated CSVs + JSON back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data updater
        run: python data_updater.py

      - name: Compute BTD indicators JSON for Vercel app
        run: python compute_btd_json.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/barchart/*.csv data/datasets/*.csv data/datasets/*.json
          git diff --staged --quiet || git commit -m "chore: data update $(date -u +%Y-%m-%d_%H:%M)"
          git push
